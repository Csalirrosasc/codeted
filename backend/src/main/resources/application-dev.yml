# Spring Boot Development Profile
# This profile is activated automatically in local development.
# Override any application.yml defaults below.

spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Dev tools — faster restarts (optional, add spring-boot-devtools to pom.xml to use)
  devtools:
    restart:
      enabled: true

# More verbose logging in development
logging:
  level:
    com.codeted: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
