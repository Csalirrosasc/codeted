name: codeted-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: codeted-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codeted}
      POSTGRES_USER: ${POSTGRES_USER:-codeted_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codeted_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeted_user -d codeted"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: codeted-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@codeted.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
